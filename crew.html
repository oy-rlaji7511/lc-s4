<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>크루원 모집 — 러닝크루 시즌4</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet" />
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --orange: #FF6B2B;
      --orange-light: #FF8C55;
      --orange-pale: #FFF0E8;
      --bg: #f4f3f2;
      --dark: #1A1A1A;
      --gray-mid: #888;
      --white: #fff;
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--dark); overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(244,243,242,0.93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--orange); text-decoration: none; }
    .nav-back { font-size: 14px; font-weight: 600; color: var(--gray-mid); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--orange); }

    /* HERO */
    .hero { width: 100%; padding-top: 72px; background: #f4f3f2; }
    .hero-banner-wrap { max-width: 1200px; margin: 0 auto; background: #f4f3f2; }
    .hero-banner { width: 100%; display: block; object-fit: cover; }

    .crew-intro { background: #f4f3f2; padding: 32px 48px; }
    .crew-intro-inner {
      max-width: 1000px; margin: 0 auto;
      display: flex; align-items: center; gap: 40px;
    }
    .crew-intro-logo { flex-shrink: 0; align-self: flex-start; padding-top: 2px; }
    .crew-intro-logo img { height: 62px; display: block; }
    .crew-intro-text { flex: 1; }
    .crew-intro-notice-title { margin-bottom: 10px; }
    .crew-notice-item {
      display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px;
    }
    .crew-notice-item .bullet { font-size: 16px; flex-shrink: 0; margin-top: 2px; filter: grayscale(100%); }
    .crew-notice-item span { font-size: clamp(14px, 1.7vw, 18px); color: #444; line-height: 1.7; word-break: keep-all; font-weight: 500; }
    .crew-notice-item span strong { color: var(--orange); font-weight: 700; }

    @media (max-width: 768px) {
      .crew-intro { padding: 28px 24px; }
      .crew-intro-inner { flex-direction: column; align-items: center; gap: 20px; text-align: center; }
      .crew-intro-text { text-align: left; }
    }

    /* MAIN */
    .main { max-width: 1100px; margin: 0 auto; padding: 52px 24px 80px; }

    /* FILTER */
    .filter-bar { display: flex; gap: 10px; margin-bottom: 36px; flex-wrap: wrap; align-items: center; }
    .filter-label { font-size: 13px; font-weight: 700; color: var(--gray-mid); margin-right: 4px; }
    .filter-btn {
      padding: 7px 18px; border-radius: 50px; border: 1.5px solid #ddd;
      font-size: 13px; font-weight: 600; cursor: pointer; background: white;
      font-family: 'Pretendard', sans-serif; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--orange); color: white; border-color: var(--orange); }
    .filter-btn:hover:not(.active) { border-color: var(--orange); color: var(--orange); }

    /* GRID */
    .crew-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    /* CARD */
    .crew-card {
      background: white; border-radius: var(--radius); padding: 24px;
      cursor: pointer; transition: all 0.25s; position: relative;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1.5px solid #f0f0f0;
    }
    .crew-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.1); border-color: var(--orange); }
    .card-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .chip {
      display: inline-block; padding: 3px 10px; border-radius: 50px;
      font-size: 11px; font-weight: 700;
    }
    .chip-keyword { background: #f0f0f0; color: #555; }
    .chip-type { background: var(--orange-pale); color: var(--orange); }
    .chip-type-side { background: #EEF2FF; color: #4F46E5; }
    .chip-type-skill { background: #FFF0E8; color: #FF6B2B; }
    .chip-type-know { background: #EDFAF3; color: #1a9e5e; }
    .chip-type-cert { background: #FFF8E1; color: #F59E0B; }
    .card-title { font-size: 17px; font-weight: 900; line-height: 1.4; margin-bottom: 16px; color: var(--dark); word-break: keep-all; }
    .card-meta { display: flex; flex-direction: column; gap: 6px; }
    .card-meta-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-mid); }
    .card-meta-item span:first-child { font-size: 15px; }
    .card-num {
      position: absolute; bottom: 16px; right: 16px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--dark); color: white;
      font-size: 12px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* EMPTY */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 24px; color: var(--gray-mid); font-size: 16px; }

    /* MODAL */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: flex-start; justify-content: center;
      overflow-y: auto; padding: 40px 24px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: white; border-radius: 20px;
      max-width: 680px; width: 100%; position: relative;
      overflow: hidden; margin: auto;
    }
    .modal-header {
      background: var(--dark); padding: 36px 40px 32px;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 22px; cursor: pointer; color: rgba(255,255,255,0.5);
      background: none; border: none; transition: color 0.2s;
    }
    .modal-close:hover { color: white; }
    .modal-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .modal-title { font-size: clamp(20px, 3vw, 28px); font-weight: 900; color: white; line-height: 1.35; margin-bottom: 20px; word-break: keep-all; }
    .modal-crew-info { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .modal-crew-name { font-size: 14px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 6px; }
    .modal-recruit { font-size: 14px; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 6px; }

    .modal-body { padding: 32px 40px; }
    .modal-section { margin-bottom: 28px; }
    .modal-section:last-child { margin-bottom: 0; }
    .modal-section-title {
      font-size: 15px; font-weight: 700; color: var(--dark);
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .modal-section-title::before {
      content: ''; width: 4px; height: 16px;
      background: var(--orange); border-radius: 2px; display: inline-block;
    }
    .modal-text { font-size: 14px; color: #555; line-height: 1.8; word-break: keep-all; }
    .modal-divider { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }

    .curriculum-item { margin-bottom: 14px; }
    .curriculum-week { font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 4px; }
    .curriculum-content { font-size: 14px; color: #555; line-height: 1.7; }

    .goal-item { display: flex; gap: 10px; margin-bottom: 10px; }
    .goal-label { font-size: 12px; font-weight: 700; color: white; background: var(--orange); padding: 2px 10px; border-radius: 50px; white-space: nowrap; height: fit-content; margin-top: 2px; }
    .goal-text { font-size: 14px; color: #555; line-height: 1.7; }

    .modal-footer { padding: 0 40px 32px; }
    .btn-apply {
      width: 100%; padding: 16px; background: var(--orange); color: white;
      border: none; border-radius: 50px; font-size: 16px; font-weight: 700;
      cursor: pointer; font-family: 'Pretendard', sans-serif; transition: all 0.2s;
    }
    .btn-apply:hover { background: var(--orange-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,43,0.3); }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .hero { padding: 100px 24px 40px; }
      .crew-grid { grid-template-columns: 1fr; }
      .modal-body { padding: 24px; }
      .modal-header { padding: 28px 24px; }
      .modal-footer { padding: 0 24px 24px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" style="text-decoration:none;">
    <img src="logo.png" alt="OLIVE YOUNG" style="height:22px; display:block;" />
  </a>
  <a href="index.html" class="nav-back">← 메인으로</a>
</nav>

<!-- HERO 배너 -->
<div class="hero">
  <div class="hero-banner-wrap">
    <img src="crew_banner.png" alt="러닝크루 시즌4 크루원 모집" class="hero-banner" />
  </div>
</div>

<!-- INTRO -->
<div class="crew-intro">
  <div class="crew-intro-inner">
    <div class="crew-intro-logo">
      <img src="check_title.png" alt="꼭 확인해 주세요~!" style="height:62px; display:block;" />
    </div>
    <div class="crew-intro-text">
      <div class="crew-notice-item">
        <span class="bullet">📌</span>
        <span>러닝크루 시즌당 한 개의 크루에만 참여할 수 있습니다. <strong>(중복 지원 불가)</strong></span>
      </div>
      <div class="crew-notice-item">
        <span class="bullet">📌</span>
        <span>개인 업무 일정 및 학습기간을 고려해 지원하며, <strong>끝까지 완주할 수 있는 크루</strong>로 지원해 주세요.</span>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="filter-bar">
    <span class="filter-label">유형</span>
    <button class="filter-btn active" onclick="filterCrew('전체', this)">전체</button>
    <button class="filter-btn" onclick="filterCrew('사이드프로젝트형', this)">사이드프로젝트형</button>
    <button class="filter-btn" onclick="filterCrew('자격취득형', this)">자격취득형</button>
    <button class="filter-btn" onclick="filterCrew('지식습득형', this)">지식습득형</button>
    <button class="filter-btn" onclick="filterCrew('업스킬링형', this)">업스킬링형</button>
  </div>
  <div class="crew-grid" id="crewGrid">
    <div class="empty-state">승인된 크루를 불러오는 중...</div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="handleModalBgClick(event)">
  <div class="modal" id="modalContent">
    <div class="modal-header">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-chips" id="modalChips"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-crew-info">
        <span class="modal-crew-name">🏃 크루장: <span id="modalCrew"></span></span>
        <span class="modal-recruit">👥 모집인원: <span id="modalRecruit"></span>명</span>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">우리 크루를 소개합니다!</div>
        <div class="modal-text" id="modalIntro"></div>
      </div>
      <hr class="modal-divider">
      <div class="modal-section">
        <div class="modal-section-title">우리 크루의 스터디 여정을 소개해요</div>
        <div class="goal-item">
          <span class="goal-label">중간목표</span>
          <span class="goal-text" id="modalMidGoal"></span>
        </div>
        <div class="goal-item">
          <span class="goal-label">최종목표</span>
          <span class="goal-text" id="modalFinalGoal"></span>
        </div>
        <div style="margin-top:16px;" id="modalCurriculum"></div>
      </div>
      <hr class="modal-divider">
      <div class="modal-section">
        <div class="modal-section-title">이런 분들과 함께 하고 싶어요</div>
        <div class="modal-text" id="modalReq"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-apply" onclick="goApply()">크루원 지원하기 →</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAdYQjs_BsPgo1PZ2TiF_sXgKIioHGYZjg",
    authDomain: "learningcrew-4.firebaseapp.com",
    projectId: "learningcrew-4",
    storageBucket: "learningcrew-4.firebasestorage.app",
    messagingSenderId: "673802856529",
    appId: "1:673802856529:web:6406fae47bfd84d41af070"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let allCrews = [];
  let currentFilter = '전체';

  function getTypeChipClass(type) {
    if (type === '사이드프로젝트형') return 'chip-type-side';
    if (type === '업스킬링형') return 'chip-type-skill';
    if (type === '지식습득형') return 'chip-type-know';
    if (type === '자격취득형') return 'chip-type-cert';
    return 'chip-type';
  }

  async function loadCrews() {
    try {
      const q = query(collection(db, 'applications'), where('status', '==', '모집중'));
      const snap = await getDocs(q);
      allCrews = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch {
      const snap = await getDocs(collection(db, 'applications'));
      allCrews = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(d => d.status === '모집중');
    }

    // 관리자 저장 순서 적용
    try {
      const orderSnap = await getDoc(doc(db, 'settings', 'crewOrder'));
      if (orderSnap.exists()) {
        const order = orderSnap.data().order;
        allCrews.sort((a, b) => {
          const ai = order.indexOf(a.id);
          const bi = order.indexOf(b.id);
          if (ai === -1) return 1;
          if (bi === -1) return -1;
          return ai - bi;
        });
      }
    } catch {}

    renderCrews(allCrews);
  }

  function renderCrews(data) {
    const grid = document.getElementById('crewGrid');
    if (!data.length) {
      grid.innerHTML = '<div class="empty-state">현재 모집 중인 크루가 없습니다.<br>곧 공개될 예정이니 기대해 주세요! 🙌</div>';
      return;
    }
    grid.innerHTML = data.map((d, i) => {
      const keywords = (d.키워드 || '').split(' ').filter(k => k.startsWith('#')).slice(0, 3);
      return `
        <div class="crew-card" onclick="openModal('${d.id}')">
          <div class="card-chips">
            ${keywords.map(k => `<span class="chip chip-keyword">${k}</span>`).join('')}
            <span class="chip ${getTypeChipClass(d.유형)}">${d.유형 || ''}</span>
          </div>
          <div class="card-title">${d.크루명 || '크루명 미정'}</div>
          <div class="card-meta">
            <div class="card-meta-item"><span>🏃</span><span>크루장: ${d.이름 || '-'} · ${d.부서 || ''}</span></div>
            <div class="card-meta-item"><span>👥</span><span>모집인원: ${d.총정원 || '-'}명</span></div>
          </div>
          <div class="card-num">${i + 1}</div>
        </div>`;
    }).join('');
  }

  window.filterCrew = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCrews(filter === '전체' ? allCrews : allCrews.filter(d => d.유형 === filter));
  };

  window.openModal = function(id) {
    const d = allCrews.find(x => x.id === id);
    if (!d) return;

    const keywords = (d.키워드 || '').split(' ').filter(k => k.startsWith('#'));
    document.getElementById('modalChips').innerHTML =
      keywords.map(k => `<span class="chip chip-keyword" style="background:rgba(255,255,255,0.15); color:white;">${k}</span>`).join('') +
      `<span class="chip ${getTypeChipClass(d.유형)}">${d.유형||''}</span>`;

    document.getElementById('modalTitle').textContent = d.크루명 || '';
    document.getElementById('modalCrew').textContent = `${d.이름||''} · ${d.부서||''}`;
    document.getElementById('modalRecruit').textContent = d.총정원 || '-';
    document.getElementById('modalIntro').innerHTML = (d.소개글||'').replace(/\n/g,'<br>');
    document.getElementById('modalMidGoal').innerHTML = (d.중간목표||'').replace(/\n/g,'<br>');
    document.getElementById('modalFinalGoal').innerHTML = (d.최종목표||'').replace(/\n/g,'<br>');
    document.getElementById('modalReq').innerHTML = (d.크루원요건||'').replace(/\n/g,'<br>');

    const curr = [];
    if (d['1_4주차']) curr.push({ week: '1~4주차', content: d['1_4주차'] });
    if (d['5_8주차']) curr.push({ week: '5~8주차', content: d['5_8주차'] });
    if (d['9_12주차']) curr.push({ week: '9~12주차', content: d['9_12주차'] });

    document.getElementById('modalCurriculum').innerHTML = curr.map(c => `
      <div class="curriculum-item">
        <div class="curriculum-week">${c.week}</div>
        <div class="curriculum-content">${c.content.replace(/\n/g,'<br>')}</div>
      </div>`).join('');

    document.getElementById('modalBg').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.goApply = function() {
    const crewName = document.getElementById('modalTitle').textContent;
    window.location.href = 'member-apply.html?crew=' + encodeURIComponent(crewName);
  };

  window.closeModal = function() {
    document.getElementById('modalBg').classList.remove('open');
    document.body.style.overflow = '';
  };

  window.handleModalBgClick = function(e) {
    if (e.target === document.getElementById('modalBg')) closeModal();
  };

  loadCrews();
</script>
</body>
</html>
