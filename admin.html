<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지 — 러닝크루 시즌4</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    :root {
      --orange: #FF6B2B;
      --orange-light: #FF8C55;
      --orange-pale: #FFF0E8;
      --bg: #f2efea;
      --dark: #1A1A1A;
      --gray-mid: #888;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--dark); }

    nav {
      background: var(--dark); padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { color: var(--orange); font-size: 18px; font-weight: 900; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-count { font-size: 13px; color: rgba(255,255,255,0.5); }
    .nav-toggle {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.08); border-radius: 50px;
      padding: 8px 18px; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.15);
      font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 700; color: white;
      transition: all 0.2s;
    }
    .nav-toggle.on { background: var(--orange); border-color: var(--orange); }
    .toggle-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.2s; }
    .nav-toggle.on .toggle-dot { background: white; }

    .nav-export {
      background: var(--orange); color: white; border: none; border-radius: 50px;
      padding: 8px 20px; font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: 'Pretendard', sans-serif;
    }
    .tab-bar {
      background: var(--dark); padding: 0 40px;
      display: flex; gap: 0; border-top: 1px solid rgba(255,255,255,0.08);
    }
    .tab-btn {
      padding: 14px 28px; font-size: 14px; font-weight: 700;
      color: rgba(255,255,255,0.4); cursor: pointer; border: none;
      background: none; font-family: 'Pretendard', sans-serif;
      border-bottom: 3px solid transparent; transition: all 0.2s;
    }
    .tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }

    .main { max-width: 1400px; margin: 0 auto; padding: 36px 24px; }
    .page-title { font-size: 24px; font-weight: 900; margin-bottom: 6px; }
    .page-desc { font-size: 13px; color: var(--gray-mid); margin-bottom: 28px; }

    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 16px; border-radius: 50px; border: 1.5px solid #ddd;
      font-size: 13px; font-weight: 600; cursor: pointer; background: white;
      font-family: 'Pretendard', sans-serif; transition: all 0.2s;
    }
    .filter-btn.active { background: var(--orange); color: white; border-color: var(--orange); }

    /* 크루장 테이블 */
    .table-wrap { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead { background: var(--dark); }
    thead th { color: white; font-size: 12px; font-weight: 700; padding: 12px 14px; text-align: left; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 10px 14px; font-size: 13px; vertical-align: middle; }
    .row-top td { padding-bottom: 4px; border-bottom: none; }
    .row-bottom td { padding-top: 4px; font-size: 12px; color: var(--gray-mid); }
    .row-bottom { border-bottom: 1px solid #f0f0f0 !important; }
    .row-top:hover, .row-top:hover + .row-bottom { background: #fafafa; }
    .td-num { font-weight: 900; color: var(--orange); font-size: 14px; text-align: center; width: 40px; }
    .td-date { color: var(--gray-mid); font-size: 11px; white-space: nowrap; }
    .td-name { font-weight: 700; font-size: 14px; }
    .td-crew { font-weight: 700; font-size: 13px; }
    .type-chip { display: inline-block; padding: 2px 8px; border-radius: 50px; font-size: 11px; font-weight: 700; background: var(--orange-pale); color: var(--orange); }
    .history-chip { display: inline-block; padding: 2px 8px; border-radius: 50px; font-size: 11px; font-weight: 700; }
    .history-yes { background: #eafaf3; color: #1a9e5e; }
    .history-no { background: #f5f5f5; color: #aaa; }
    .applicant-count {
      display: inline-flex; align-items: center; gap: 4px;
      background: #EEF2FF; color: #4F46E5;
      padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 700;
    }

    .status-btns { display: flex; flex-direction: column; gap: 4px; }
    .btn-recruit { padding: 4px 10px; border-radius: 6px; border: 1.5px solid #ddd; font-size: 11px; font-weight: 700; cursor: pointer; background: white; font-family: 'Pretendard', sans-serif; transition: all 0.2s; white-space: nowrap; }
    .btn-recruit.active-recruit { background: var(--orange); color: white; border-color: var(--orange); }
    .btn-close { padding: 4px 10px; border-radius: 6px; border: 1.5px solid #ddd; font-size: 11px; font-weight: 700; cursor: pointer; background: white; font-family: 'Pretendard', sans-serif; transition: all 0.2s; white-space: nowrap; }
    .btn-close.active-close { background: #555; color: white; border-color: #555; }
    .manage-btns { display: flex; flex-direction: column; gap: 4px; }
    .btn-delete { padding: 4px 10px; border-radius: 6px; border: 1px solid #ffcccc; font-size: 11px; font-weight: 600; cursor: pointer; background: #fff5f5; color: #e53935; font-family: 'Pretendard', sans-serif; transition: all 0.2s; }
    .btn-delete:hover { background: #e53935; color: white; border-color: #e53935; }
    .btn-edit:hover { border-color: var(--orange); color: var(--orange); }
    .btn-memo { padding: 4px 10px; border-radius: 6px; border: 1px solid #ddd; font-size: 11px; font-weight: 600; cursor: pointer; background: white; font-family: 'Pretendard', sans-serif; }
    .btn-memo.has-memo { border-color: #4F46E5; background: #EEF2FF; color: #4F46E5; }

    /* 크루원 신청현황 칸반 */
    .kanban-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
    }
    .kanban-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .kanban-col { cursor: grab; }
    .kanban-col.dragging { opacity: 0.5; cursor: grabbing; }
    .kanban-col.drag-over { border: 2px dashed var(--orange); }
    .kanban-col-header {
      padding: 16px 20px; background: var(--dark);
      display: flex; align-items: center; justify-content: space-between;
    }
    .kanban-col-title { font-size: 14px; font-weight: 700; color: white; word-break: keep-all; }
    .kanban-col-count {
      background: var(--orange); color: white;
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 50px;
      white-space: nowrap;
    }
    .kanban-col-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-col-footer { padding: 12px; border-top: 1px solid #f0f0f0; }
    .btn-csv-crew {
      width: 100%; padding: 8px; background: var(--orange-pale); color: var(--orange);
      border: 1px solid var(--orange); border-radius: 8px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: 'Pretendard', sans-serif; transition: all 0.2s;
    }
    .btn-csv-crew:hover { background: var(--orange); color: white; }

    .applicant-card {
      background: #fafafa; border-radius: 10px; padding: 12px 14px;
      border: 1px solid #f0f0f0;
    }
    .applicant-card-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
    .applicant-card-info { font-size: 12px; color: var(--gray-mid); line-height: 1.7; }
    .applicant-card-info span { display: block; }
    .applicant-card-motivation {
      font-size: 12px; color: #555; line-height: 1.6;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #ebebeb;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }

    .empty-state { text-align: center; padding: 40px 16px; color: var(--gray-mid); font-size: 13px; }

    /* MODAL */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: white; border-radius: 20px; padding: 36px 40px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 20px; font-size: 22px; cursor: pointer; color: var(--gray-mid); background: none; border: none; }
    .modal-title { font-size: 18px; font-weight: 900; margin-bottom: 24px; }
    .modal-field { margin-bottom: 14px; }
    .modal-label { font-size: 12px; font-weight: 700; color: var(--orange); margin-bottom: 5px; letter-spacing: 1px; display: block; }
    .modal-input { width: 100%; padding: 10px 14px; border: 1.5px solid #EBEBEB; border-radius: 8px; font-size: 14px; font-family: 'Pretendard', sans-serif; outline: none; resize: vertical; transition: border-color 0.2s; }
    .modal-input:focus { border-color: var(--orange); }
    .modal-save { width: 100%; padding: 14px; background: var(--orange); color: white; border: none; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Pretendard', sans-serif; margin-top: 12px; }
    .memo-modal { background: white; border-radius: 20px; padding: 32px 36px; max-width: 480px; width: 90%; position: relative; }
    .memo-textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #EBEBEB; border-radius: 10px; font-size: 14px; font-family: 'Pretendard', sans-serif; outline: none; resize: vertical; min-height: 120px; }
    .memo-textarea:focus { border-color: #4F46E5; }
    .memo-save { width: 100%; padding: 13px; background: #4F46E5; color: white; border: none; border-radius: 50px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Pretendard', sans-serif; margin-top: 10px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">LEARNING CREW 관리자</div>
  <div class="nav-right">
    <button class="nav-toggle" id="recruitToggle" onclick="toggleRecruitment()">
      <span class="toggle-dot"></span>
      <span id="toggleLabel">크루장 모집 : OFF</span>
    </button>
    <span class="nav-count" id="navCount">총 0건</span>
    <button class="nav-export" id="exportBtn" onclick="exportCSV()">CSV 다운로드</button>
  </div>
</nav>

<!-- 탭 -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('leader', this)">크루장 신청현황</button>
  <button class="tab-btn" onclick="switchTab('member', this)">크루원 신청현황</button>
</div>

<!-- 크루장 신청현황 -->
<div class="main" id="leaderTab">
  <div class="page-title">크루장 신청 현황</div>
  <div class="page-desc">신청일시 기준 최신순</div>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterData('전체', this)">전체</button>
    <button class="filter-btn" onclick="filterData('모집중', this)">모집중</button>
    <button class="filter-btn" onclick="filterData('마감', this)">마감</button>
    <button class="filter-btn" id="sortBtn" onclick="sortByDate()" style="margin-left:auto;">신청일시 ↓</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="text-align:center;">순번</th>
          <th>신청일시</th>
          <th>이름 / 팀</th>
          <th>참여이력</th>
          <th>크루명 / 유형</th>
          <th>총정원</th>
          <th>지원자</th>
          <th>메모</th>
          <th>모집상태</th>
          <th>관리</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="10" class="empty-state">데이터를 불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 크루원 신청현황 -->
<div class="main" id="memberTab" style="display:none;">
  <div class="kanban-header">
    <div>
      <div class="page-title">크루원 신청 현황</div>
      <div class="page-desc">크루별 지원자 현황</div>
    </div>
  </div>
  <div class="kanban-grid" id="kanbanGrid">
    <div class="empty-state" style="grid-column:1/-1;">데이터를 불러오는 중...</div>
  </div>
</div>

<!-- 상세/수정 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">신청서 상세 / 수정</div>
    <div id="modalFields"></div>
    <button class="modal-save" onclick="saveModal()">수정 저장</button>
  </div>
</div>

<!-- 메모 모달 -->
<div class="modal-bg" id="memoBg">
  <div class="memo-modal">
    <button class="modal-close" onclick="closeMemo()">✕</button>
    <div class="modal-title" style="font-size:16px; margin-bottom:16px;">📝 메모</div>
    <textarea class="memo-textarea" id="memoText" placeholder="메모를 입력해 주세요..."></textarea>
    <button class="memo-save" onclick="saveMemo()">메모 저장</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAdYQjs_BsPgo1PZ2TiF_sXgKIioHGYZjg",
    authDomain: "learningcrew-4.firebaseapp.com",
    projectId: "learningcrew-4",
    storageBucket: "learningcrew-4.firebasestorage.app",
    messagingSenderId: "673802856529",
    appId: "1:673802856529:web:6406fae47bfd84d41af070"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allData = [];
  let memberData = [];
  let currentFilter = '전체';
  let currentTab = 'leader';
  let currentDocId = null;
  let memoDocId = null;

  const FIELDS = ['이름','부서','사번','참여여부','크루명','유형','활동기간',
    '중간목표','최종목표','1_4주차','5_8주차','9_12주차','교보재',
    '총정원','신규모집인원','사전구성인원','크루원요건','소개글','키워드'];
  const FIELD_LABELS = {
    '이름':'이름','부서':'부서','사번':'사번','참여여부':'참여여부','크루명':'크루명',
    '유형':'유형','활동기간':'활동기간','중간목표':'중간목표','최종목표':'최종목표',
    '1_4주차':'1~4주차','5_8주차':'5~8주차','9_12주차':'9~12주차','교보재':'교보재',
    '총정원':'총정원','신규모집인원':'신규모집인원','사전구성인원':'사전구성인원',
    '크루원요건':'크루원요건','소개글':'소개글','키워드':'키워드'
  };
  const TEXTAREA_FIELDS = ['중간목표','최종목표','1_4주차','5_8주차','9_12주차','크루원요건','소개글'];

  // 탭 전환
  window.switchTab = function(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('leaderTab').style.display = tab === 'leader' ? 'block' : 'none';
    document.getElementById('memberTab').style.display = tab === 'member' ? 'block' : 'none';
    document.getElementById('exportBtn').style.display = tab === 'leader' ? 'block' : 'none';
    if (tab === 'member') renderKanban();
    else {
      document.getElementById('navCount').textContent = `총 ${allData.length}건`;
    }
  };

  async function loadData() {
    try {
      const q = query(collection(db, 'applications'), orderBy('신청일시', 'desc'));
      const snap = await getDocs(q);
      allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch {
      const snap = await getDocs(collection(db, 'applications'));
      allData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      allData.sort((a,b) => (b.신청일시||'').localeCompare(a.신청일시||''));
    }

    try {
      const snap2 = await getDocs(collection(db, 'member_applications'));
      memberData = snap2.docs.map(d => ({ id: d.id, ...d.data() }));
    } catch { memberData = []; }

    document.getElementById('navCount').textContent = `총 ${allData.length}건`;
    renderTable(allData);
  }

  function getApplicantCount(crewName) {
    return memberData.filter(m => m.지원크루명 === crewName).length;
  }

  let sortAsc = false;

  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="empty-state">신청 데이터가 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = data.map((d, i) => {
      const status = d.status || '대기중';
      const hasMemo = d.memo && d.memo.trim() !== '';
      const count = getApplicantCount(d.크루명);
      return `
        <tr class="row-top">
          <td class="td-num" rowspan="2">${i + 1}</td>
          <td class="td-date" rowspan="2">${(d.신청일시||'-').replace(',','<br>')}</td>
          <td class="td-name">${d.이름||'-'} <span style="font-size:11px; color:#aaa; font-weight:400;">${d.직급||''}</span></td>
          <td rowspan="2"><span class="history-chip ${d.참여여부==='있음'?'history-yes':'history-no'}">${d.참여여부==='있음'?'있음':'없음'}</span></td>
          <td class="td-crew">${d.크루명||'-'}</td>
          <td rowspan="2">${d.총정원||'-'}명</td>
          <td rowspan="2"><span class="applicant-count">👥 ${count}명</span></td>
          <td rowspan="2">
            <button class="btn-memo ${hasMemo?'has-memo':''}" onclick="openMemo('${d.id}')">
              ${hasMemo ? '📝 있음' : '메모'}
            </button>
          </td>
          <td rowspan="2">
            <div class="status-btns">
              <button class="btn-recruit ${status==='모집중'?'active-recruit':''}" onclick="setStatus('${d.id}','모집중')">모집중</button>
              <button class="btn-close ${status==='마감'?'active-close':''}" onclick="setStatus('${d.id}','마감')">마감</button>
            </div>
          </td>
          <td rowspan="2">
            <div class="manage-btns">
              <button class="btn-edit" onclick="openModal('${d.id}')">상세/수정</button>
              <button class="btn-delete" onclick="deleteEntry('${d.id}','${(d.이름||'').replace(/'/g,'\\\'') }')">✕ 삭제</button>
            </div>
          </td>
        </tr>
        <tr class="row-bottom">
          <td>${d.부서||'-'}</td>
          <td><span class="type-chip">${d.유형||'-'}</span></td>
        </tr>`;
    }).join('');
  }

  window.sortByDate = function() {
    sortAsc = !sortAsc;
    allData.sort((a,b) => sortAsc
      ? (a.신청일시||'').localeCompare(b.신청일시||'')
      : (b.신청일시||'').localeCompare(a.신청일시||'')
    );
    const btn = document.getElementById('sortBtn');
    btn.textContent = sortAsc ? '신청일시 ↑' : '신청일시 ↓';
    const filtered = currentFilter === '전체' ? allData : allData.filter(d => (d.status||'대기중') === currentFilter);
    renderTable(filtered);
  };

  window.deleteEntry = async function(id, name) {
    if (!confirm(`"${name}"을 정말 삭제하시겠습니까?`)) return;
    const pw = prompt('삭제 비밀번호를 입력해 주세요.');
    if (pw !== '7629') { alert('비밀번호가 올바르지 않습니다.'); return; }
    await deleteDoc(doc(db, 'applications', id));
    allData = allData.filter(x => x.id !== id);
    document.getElementById('navCount').textContent = `총 ${allData.length}건`;
    const filtered = currentFilter === '전체' ? allData : allData.filter(d => (d.status||'대기중') === currentFilter);
    renderTable(filtered);
    alert('삭제되었습니다.');
  };

  function renderKanban() {
    const grid = document.getElementById('kanbanGrid');
    const approvedCrews = allData.filter(d => d.status === '모집중' || d.status === '마감');

    document.getElementById('navCount').textContent = `크루원 총 ${memberData.length}명`;

    if (!approvedCrews.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;">모집중인 크루가 없습니다.</div>';
      return;
    }

    grid.innerHTML = approvedCrews.map(crew => {
      const applicants = memberData.filter(m => m.지원크루명 === crew.크루명);
      return `
        <div class="kanban-col" draggable="true" data-id="${crew.id}">
          <div class="kanban-col-header">
            <div class="kanban-col-title">${crew.크루명||'-'}</div>
            <span class="kanban-col-count">${applicants.length}명 / ${crew.총정원||'-'}명</span>
          </div>
          <div class="kanban-col-body">
            ${applicants.length === 0
              ? '<div class="empty-state">지원자가 없습니다.</div>'
              : applicants.map(a => `
                <div class="applicant-card">
                  <div class="applicant-card-name">
                    <span>${a.이름||'-'}</span>
                    <span class="history-chip ${a.참여여부==='있음'?'history-yes':'history-no'}" style="font-size:10px;">${a.참여여부==='있음'?'참여이력있음':'신규'}</span>
                  </div>
                  <div class="applicant-card-info">
                    <span>🏢 ${a.부서||'-'} · ${a.직급||''} · ${a.사번||'-'}</span>
                    <span>📅 ${a.신청일시||'-'}</span>
                  </div>
                  ${a.지원동기 ? `<div class="applicant-card-motivation">${a.지원동기}</div>` : ''}
                </div>`).join('')}
          </div>
          <div class="kanban-col-footer">
            <button class="btn-csv-crew" onclick="exportCrewCSV('${crew.크루명}')">📥 ${crew.크루명} CSV 다운로드</button>
          </div>
        </div>`;
    }).join('');

    // 드래그 순서 조정
    let dragEl = null;
    grid.querySelectorAll('.kanban-col').forEach(col => {
      col.addEventListener('dragstart', () => { dragEl = col; col.classList.add('dragging'); });
      col.addEventListener('dragend', () => { dragEl = null; col.classList.remove('dragging'); grid.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over')); });
      col.addEventListener('dragover', e => { e.preventDefault(); if (col !== dragEl) col.classList.add('drag-over'); });
      col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
      col.addEventListener('drop', e => {
        e.preventDefault();
        col.classList.remove('drag-over');
        if (dragEl && col !== dragEl) {
          const cols = [...grid.querySelectorAll('.kanban-col')];
          const fromIdx = cols.indexOf(dragEl);
          const toIdx = cols.indexOf(col);
          if (fromIdx < toIdx) col.after(dragEl);
          else col.before(dragEl);
        }
      });
    });
  }

  window.filterData = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = filter === '전체' ? allData : allData.filter(d => (d.status||'대기중') === filter);
    renderTable(filtered);
  };

  window.setStatus = async function(id, status) {
    const d = allData.find(x => x.id === id);
    const current = d?.status || '대기중';
    const newStatus = current === status ? '대기중' : status;
    await updateDoc(doc(db,'applications',id), { status: newStatus });
    const idx = allData.findIndex(x => x.id === id);
    if (idx !== -1) allData[idx].status = newStatus;
    const filtered = currentFilter === '전체' ? allData : allData.filter(d => (d.status||'대기중') === currentFilter);
    renderTable(filtered);
  };

  window.openModal = function(id) {
    currentDocId = id;
    const d = allData.find(x => x.id === id);
    document.getElementById('modalFields').innerHTML = FIELDS.map(f => `
      <div class="modal-field">
        <label class="modal-label">${FIELD_LABELS[f]||f}</label>
        ${f === '유형' ? `<select class="modal-input" id="mf-${f}">
          <option ${d[f]==='사이드프로젝트형'?'selected':''}>사이드프로젝트형</option>
          <option ${d[f]==='자격취득형'?'selected':''}>자격취득형</option>
          <option ${d[f]==='지식습득형'?'selected':''}>지식습득형</option>
          <option ${d[f]==='업스킬링형'?'selected':''}>업스킬링형</option>
        </select>`
        : TEXTAREA_FIELDS.includes(f) ? `<textarea class="modal-input" id="mf-${f}" rows="3">${d[f]||''}</textarea>`
        : `<input class="modal-input" id="mf-${f}" type="text" value="${(d[f]||'').replace(/"/g,'&quot;')}" />`}
      </div>`).join('');
    document.getElementById('modalBg').classList.add('open');
  };

  window.closeModal = function() {
    document.getElementById('modalBg').classList.remove('open');
    currentDocId = null;
  };

  window.saveModal = async function() {
    if (!currentDocId) return;
    const btn = document.querySelector('.modal-save');
    btn.textContent = '저장 중...'; btn.disabled = true;
    try {
      const updated = {};
      FIELDS.forEach(f => {
        const el = document.getElementById('mf-' + f);
        if (el) updated[f] = el.value;
      });
      await updateDoc(doc(db,'applications',currentDocId), updated);
      const idx = allData.findIndex(x => x.id === currentDocId);
      if (idx !== -1) allData[idx] = { ...allData[idx], ...updated };
      alert('✅ 수정이 저장되었습니다!');
      closeModal();
      const filtered = currentFilter === '전체' ? allData : allData.filter(d => (d.status||'대기중') === currentFilter);
      renderTable(filtered);
    } catch(err) {
      alert('저장 오류: ' + err.message);
    } finally {
      btn.textContent = '수정 저장'; btn.disabled = false;
    }
  };

  window.openMemo = function(id) {
    memoDocId = id;
    const d = allData.find(x => x.id === id);
    document.getElementById('memoText').value = d?.memo || '';
    document.getElementById('memoBg').classList.add('open');
  };

  window.closeMemo = function() {
    document.getElementById('memoBg').classList.remove('open');
    memoDocId = null;
  };

  window.saveMemo = async function() {
    const memo = document.getElementById('memoText').value;
    await updateDoc(doc(db,'applications',memoDocId), { memo });
    const idx = allData.findIndex(x => x.id === memoDocId);
    if (idx !== -1) allData[idx].memo = memo;
    closeMemo();
    const filtered = currentFilter === '전체' ? allData : allData.filter(d => (d.status||'대기중') === currentFilter);
    renderTable(filtered);
  };

  // 전체 CSV
  window.exportCSV = function() {
    if (!allData.length) { alert('데이터가 없습니다.'); return; }
    const keys = ['신청일시','이름','사번','부서','참여여부','크루명','유형','활동기간',
      '중간목표','최종목표','1_4주차','5_8주차','9_12주차','교보재',
      '총정원','신규모집인원','사전구성인원','크루원요건','소개글','키워드','status','memo'];
    const labels = ['순번','신청일시','이름','사번','부서','참여이력','크루명','유형','활동기간',
      '중간목표','최종목표','1~4주차','5~8주차','9~12주차','교보재',
      '총정원','신규모집인원','사전구성인원','크루원요건','소개글','키워드','모집상태','메모'];
    const csv = [labels.join(','), ...allData.map((d, i) =>
      [`"${i+1}"`, ...keys.map(k => {
        let val = (d[k]||'').toString().replace(/"/g,'""');
        if (val.startsWith('#')) val = ' ' + val;
        return `"${val}"`;
      })].join(',')
    )].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
    a.download = `러닝크루_크루장신청현황_${new Date().toLocaleDateString('ko-KR')}.csv`;
    a.click();
  };

  // 크루별 CSV
  window.exportCrewCSV = function(crewName) {
    const applicants = memberData.filter(m => m.지원크루명 === crewName);
    if (!applicants.length) { alert('지원자가 없습니다.'); return; }
    const keys = ['신청일시','지원크루명','이름','사번','부서','참여여부','지원동기'];
    const labels = ['순번','신청일시','지원크루명','이름','사번','부서','참여이력','지원동기'];
    const csv = [labels.join(','), ...applicants.map((d, i) =>
      [`"${i+1}"`, ...keys.map(k => {
        let val = (d[k]||'').toString().replace(/"/g,'""');
        if (val.startsWith('#')) val = ' ' + val;
        return `"${val}"`;
      })].join(',')
    )].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
    a.download = `${crewName}_크루원지원현황_${new Date().toLocaleDateString('ko-KR')}.csv`;
    a.click();
  };

  // 모집 토글 초기 상태 로드
  async function loadToggleState() {
    try {
      const snap = await getDoc(doc(db, 'settings', 'recruitment'));
      const active = snap.exists() && snap.data().active === true;
      updateToggleUI(active);
    } catch(e) {}
  }

  function updateToggleUI(active) {
    const btn = document.getElementById('recruitToggle');
    const label = document.getElementById('toggleLabel');
    if (active) {
      btn.classList.add('on');
      label.textContent = '크루장 모집 : ON';
    } else {
      btn.classList.remove('on');
      label.textContent = '크루장 모집 : OFF';
    }
  }

  window.toggleRecruitment = async function() {
    try {
      const snap = await getDoc(doc(db, 'settings', 'recruitment'));
      const current = snap.exists() && snap.data().active === true;
      const newState = !current;
      await setDoc(doc(db, 'settings', 'recruitment'), { active: newState });
      updateToggleUI(newState);
      alert(newState ? '✅ 크루장 모집이 활성화되었습니다!' : '⛔ 크루장 모집이 비활성화되었습니다.');
    } catch(e) {
      alert('오류: ' + e.message);
    }
  };

  loadData();
  loadToggleState();
</script>
</body>
</html>
